{% extends "system_base.html" %}

{% block h1 %}{% block title %}重置密码{% endblock %}{% endblock %}

{% block content %}
    <div class="login-form">
        <p>忘记密码？请输入电子邮箱地址，我们将向您发送密码重置说明。</p>
        <form method="POST">
            {% csrf_token %}
            <div class="text-input">
                <input type="email" name="email" autocomplete="email" placeholder="邮箱地址" maxlength="254" required id="id_email">
            </div>
            <button class="btn btn-primary" type="submit">发送邮件</button>
        </form>
    </div>
{% endblock %}
