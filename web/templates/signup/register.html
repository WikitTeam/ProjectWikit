{% extends "system_base.html" %}

{% block h1 %}{% block title %}用户注册{% endblock %}{% endblock %}

{% block content %}
<div class="login-form">

    {% if error %}
    <div class="error">
        <p>{{ error }}</p>
    </div>
    <br>
    {% endif %}

    <form method="POST" id="signup-form">
        {% csrf_token %}

        <div class="text-input">
            <span class="icon begin"><i class="fas fa-user"></i></span>
            <input
                type="text"
                placeholder="用户名（认领 Wikidot 账号请填写原名）"
                name="username"
                id="id_username"
                autofocus
                required
                value="{{ prefill_username|default:'' }}"
            >
        </div>

        <div id="wikidot-section" style="display:{% if is_wikidot %}block{% else %}none{% endif %};">
            <div style="margin-top: 8px; padding: 6px 10px; background: #f5f5f5; border-left: 3px solid #888; font-size: 12px; color: #555; line-height: 1.4;">
                <i class="fas fa-info-circle" style="margin-right: 4px;"></i>检测到此用户名对应一个待认领的Wikidot账号。请点击"发送验证码"完成认领。
            </div>
            <div class="text-input" style="display: flex; align-items: center;">
                <span class="icon begin"><i class="fas fa-key"></i></span>
                <input
                    type="text"
                    placeholder="Wikit 验证码"
                    name="verification_code"
                    id="id_verification_code"
                    style="flex: 1; min-width: 0;"
                >
                <button type="button" id="send-code-btn" class="btn btn-secondary" style="margin-left: 8px; white-space: nowrap; margin-top: 0; padding: 4px 10px; font-size: 13px;">
                    发送验证码
                </button>
            </div>
            <div id="send-code-msg" class="error" style="display:none; margin-top: 8px;"></div>
        </div>

        <div class="text-input">
            <span class="icon begin"><i class="fas fa-lock"></i></span>
            <input type="password" placeholder="设置密码" name="password" required id="id_password">
        </div>
        <div class="text-input">
            <span class="icon begin"><i class="fas fa-lock"></i></span>
            <input type="password" placeholder="确认密码" name="password_confirm" required id="id_password_confirm">
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">立即注册</button>
    </form>

    <div class="under-text">
        <p>普通注册将默认分配"读者"权限。</p>
        <a href="{% url 'login' %}">已有账号？去登录</a>
    </div>
</div>

<script>
(function () {
    const usernameInput = document.getElementById('id_username');
    const wikidotSection = document.getElementById('wikidot-section');
    const sendCodeBtn = document.getElementById('send-code-btn');
    const sendCodeMsg = document.getElementById('send-code-msg');
    const submitBtn = document.getElementById('submit-btn');

    let checkTimer = null;
    let isWikidot = {% if is_wikidot %}true{% else %}false{% endif %};

    function updateSubmitBtn() {
        submitBtn.textContent = isWikidot ? '认领账号' : '立即注册';
    }
    updateSubmitBtn();

    usernameInput.addEventListener('input', function () {
        clearTimeout(checkTimer);
        const username = usernameInput.value.trim();
        if (!username) {
            setWikidot(false);
            return;
        }
        checkTimer = setTimeout(function () {
            checkWikidotUsername(username);
        }, 600);
    });

    function checkWikidotUsername(username) {
        fetch('/-//signup/check-wikidot?username=' + encodeURIComponent(username))
            .then(function (r) { return r.json(); })
            .then(function (data) {
                setWikidot(data.is_wikidot);
            })
            .catch(function () {
                setWikidot(false);
            });
    }

    function setWikidot(val) {
        isWikidot = val;
        wikidotSection.style.display = val ? 'block' : 'none';
        updateSubmitBtn();
        if (!val) {
            sendCodeMsg.textContent = '';
            sendCodeMsg.style.display = 'none';
        }
    }

    sendCodeBtn.addEventListener('click', function () {
        const username = usernameInput.value.trim();
        if (!username) return;

        sendCodeBtn.disabled = true;
        sendCodeMsg.classList.remove('error');
        sendCodeMsg.style.color = '#888';
        sendCodeMsg.style.display = 'block';
        sendCodeMsg.textContent = '发送中…';

        const formData = new FormData();
        formData.append('username', username);
        formData.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);

        fetch('/-/signup/send-wikidot-code', {
            method: 'POST',
            body: formData
        })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (data.ok) {
                    sendCodeMsg.classList.remove('error');
                    sendCodeMsg.style.color = '#4a9eda';
                    sendCodeMsg.style.display = 'block';
                    sendCodeMsg.textContent = '验证码已发送，请前往Wikidot站内信查收。';
                    let countdown = 60;
                    sendCodeBtn.textContent = `重新发送 (${countdown}s)`;
                    const timer = setInterval(function () {
                        countdown--;
                        if (countdown <= 0) {
                            clearInterval(timer);
                            sendCodeBtn.disabled = false;
                            sendCodeBtn.textContent = '发送验证码';
                        } else {
                            sendCodeBtn.textContent = `重新发送 (${countdown}s)`;
                        }
                    }, 1000);
                } else {
                    sendCodeMsg.classList.add('error');
                    sendCodeMsg.style.color = '';
                    sendCodeMsg.style.display = 'block';
                    sendCodeMsg.textContent = data.error || '发送失败，请稍后重试';
                    sendCodeBtn.disabled = false;
                }
            })
            .catch(function () {
                sendCodeMsg.classList.add('error');
                sendCodeMsg.style.color = '';
                sendCodeMsg.style.display = 'block';
                sendCodeMsg.textContent = '网络错误，请稍后重试';
                sendCodeBtn.disabled = false;
            });
    });
})();
</script>
{% endblock %}
